version: "3.9"

# ── Development setup ──────────────────────────────────────────────────────────
# Docker hanya untuk: Redis + PostgreSQL + Flower
# FastAPI + Celery worker jalan LOKAL di Mac (pakai .venv)
#
# Cara jalankan:
#   docker compose -f infra/docker-compose.dev.yml up -d
#
# Lalu di terminal terpisah:
#   celery -A shared.celery_app.celery_app worker -Q pipeline -c 2 -l info
#   uvicorn agent_input_handler.main:app --reload --port 8000

services:
  redis:
    image: redis:7-alpine
    container_name: jagawarga-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: jagawarga-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jagawarga
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jagawarga
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jagawarga"]
      interval: 5s
      timeout: 3s
      retries: 5

  flower:
    image: mher/flower:2.0
    container_name: jagawarga-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  redis_data:
  postgres_data: